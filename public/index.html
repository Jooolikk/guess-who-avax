<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess Who on Avalanche</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #05030a;
      color: #fdfdfd;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .app {
      width: 100%;
      max-width: 1400px;
      padding: 24px 16px 40px;
      position: relative;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 16px;
    }
    .top-btn {
      display: block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.7);
      color: #ffd978;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 0 12px rgba(255,200,80,0.4);
    }
    .top-btn:hover {
      background: rgba(0,0,0,0.9);
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,220,120,0.7);
    }
    .main-card {
      margin: 0 auto;
      max-width: 1200px;
      background: radial-gradient(circle at top, #1a0f24 0, #050208 60%);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.85);
      padding: 24px 24px 30px;
      position: relative;
      overflow: hidden;
    }
    .main-inner { position: relative; z-index: 1; }
    .exit-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
      color: #ddd;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
    .exit-btn:hover { background: rgba(255,255,255,0.18); }

    .center-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .start-btn {
      padding: 26px 52px;
      border-radius: 999px;
      border: 3px solid #ffdf7a;
      font-size: 1.2rem;
      font-weight: 900;
      color: #fff9e0;
      background: radial-gradient(circle at 30% 20%, #fff6c4 0, #ffb347 40%, #ff7b37 100%);
      box-shadow: 0 0 26px rgba(255,180,70,0.9);
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      text-align: center;
      line-height: 1.1;
    }
    .start-btn-line {
      display: block;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(255,210,120,1);
    }

    .table-wrapper {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }
    .table {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 320px;
      background: radial-gradient(circle at 50% 15%, #2a1724 0, #0a050d 45%, #010005 100%);
      border-radius: 50% / 50%;
      box-shadow: 0 26px 60px rgba(0,0,0,0.9);
      border: 4px solid rgba(255,180,70,0.5);
      overflow: visible;
    }
    .table-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) skew(-12deg);
      font-size: 2.3rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: rgba(255,60,60,0.25);
      text-transform: uppercase;
    }
    .player-seat {
      position: absolute;
      width: 17%;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .player-body {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      background: linear-gradient(145deg,#ff9966,#ff5e62);
      box-shadow: 0 16px 28px rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .player-number {
      font-size: 2.1rem;
      font-weight: 900;
      color: #fffaf0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
    .player-card {
      position: absolute;
      bottom: 80px;
      width: 96px;
      height: 130px;
      border-radius: 10px;
      background: linear-gradient(145deg,#ffcc33,#ff7b37);
      box-shadow: 0 10px 22px rgba(0,0,0,0.9);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 6px;
      transform-origin: center bottom;
      transform: translateY(-8px);
    }
    .player-card-inner {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: #22041d;
      color: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 6px;
      font-size: 0.7rem;
      text-align: center;
    }
    .player-name-hidden .player-card-inner {
      background: repeating-linear-gradient(
        45deg,
        #b33b3b,
        #b33b3b 8px,
        #f7cfbf 8px,
        #f7cfbf 16px
      );
      color: transparent;
    }
    .player-out {
      filter: grayscale(0.92) brightness(0.35);
    }
    .player-out .player-card {
      box-shadow: none;
    }
    .player-out .player-card-inner {
      background: #050308;
    }

    .seat-1 { top: 74%; left: 6%; }
    .seat-2 { top: 36%; left: 22%; }
    .seat-3 { top: 20%; left: 45%; }
    .seat-4 { top: 36%; left: 68%; }
    .seat-5 { top: 74%; left: 84%; }
    .seat-6 { top: 88%; left: 45%; }

    .turn-badge {
      position: absolute;
      bottom: -32px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #ffb347;
      color: #3b0b20;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .question-panel {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 3fr 1.5fr;
      gap: 18px;
      align-items: center;
    }
    .question-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .question-btn {
      width: 100%;
      text-align: left;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid #f5d677;
      background: rgba(10,5,20,0.9);
      color: #fff4e6;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(245,214,119,0.35);
      position: relative;
      overflow: hidden;
      transition: all 0.18s ease;
    }
    .question-btn span.label { position: relative; z-index: 1; }
    .question-btn:hover { transform: translateY(-1px); box-shadow: 0 0 22px rgba(245,214,119,0.7); }

    .question-btn.correct {
      background: radial-gradient(circle at 0 0,#1f7a3c 0,#0b2512 70%);
      border-color: #7fff9c;
      box-shadow: 0 0 22px rgba(127,255,156,0.7);
    }
    .question-btn.wrong {
      background: radial-gradient(circle at 0 0,#7a1f1f 0,#250b0b 70%);
      border-color: #ff9c9c;
      animation: flash-red 0.7s ease;
      box-shadow: 0 0 22px rgba(255,120,120,0.7);
    }
    @keyframes flash-red {
      0%,100% { box-shadow: 0 0 0 rgba(255,0,0,0); }
      40% { box-shadow: 0 0 16px rgba(255,40,40,0.9); }
    }

    .guess-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .guess-main-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #ffd65a;
      background: radial-gradient(circle at 30% 20%,#ffe9c9 0,#ff2f2f 40%,#850606 100%);
      color: #fff;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      box-shadow: 0 0 28px rgba(255,70,70,0.9);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.1;
    }
    .guess-main-btn-line { display: block; }
    .guess-main-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 36px rgba(255,110,110,1);
    }
    .guess-main-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .guess-options {
      margin-top: 10px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .guess-option-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid #ffd876;
      background: rgba(0,0,0,0.7);
      color:#fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 0 14px rgba(255,200,90,0.4);
    }
    .guess-option-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,220,140,0.8);
    }
