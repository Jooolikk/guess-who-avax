<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess Who on Avalanche</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #05030a;
      color: #fdfdfd;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .app {
      width: 100%;
      max-width: 1400px;
      padding: 24px 16px 40px;
      position: relative;
    }
    .top-bar {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 16px;
    }
    .top-btn {
      display: block;
      padding: 8px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(0,0,0,0.7);
      color: #ffd978;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 0 12px rgba(255,200,80,0.4);
    }
    .top-btn:hover {
      background: rgba(0,0,0,0.9);
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,220,120,0.7);
    }
    .main-card {
      margin: 0 auto;
      max-width: 1200px;
      background: radial-gradient(circle at top, #1a0f24 0, #050208 60%);
      border-radius: 24px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.85);
      padding: 24px 24px 30px;
      position: relative;
      overflow: hidden;
    }
    .main-inner { position: relative; z-index: 1; }
    .exit-btn {
      position: absolute;
      top: 16px;
      left: 16px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.08);
      color: #ddd;
      font-size: 0.8rem;
      cursor: pointer;
      z-index: 3;
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }
    .exit-btn:hover { background: rgba(255,255,255,0.18); }

    .center-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 18px;
    }
    .start-btn {
      padding: 26px 52px;
      border-radius: 999px;
      border: 3px solid #ffdf7a;
      font-size: 1.2rem;
      font-weight: 900;
      color: #fff9e0;
      background: radial-gradient(circle at 30% 20%, #fff6c4 0, #ffb347 40%, #ff7b37 100%);
      box-shadow: 0 0 26px rgba(255,180,70,0.9);
      cursor: pointer;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      text-align: center;
      line-height: 1.1;
    }
    .start-btn-line {
      display: block;
    }
    .start-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 36px rgba(255,210,120,1);
    }

    .table-wrapper {
      margin-top: 10px;
      display: flex;
      justify-content: center;
    }
    .table {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 320px;
      background: radial-gradient(circle at 50% 15%, #2a1724 0, #0a050d 45%, #010005 100%);
      border-radius: 50% / 50%;
      box-shadow: 0 26px 60px rgba(0,0,0,0.9);
      border: 4px solid rgba(255,180,70,0.5);
      overflow: visible;
    }
    .table-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) skew(-12deg);
      font-size: 2.3rem;
      font-weight: 800;
      letter-spacing: 0.2em;
      color: rgba(255,60,60,0.25);
      text-transform: uppercase;
    }
    .player-seat {
      position: absolute;
      width: 17%;
      height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .player-body {
      width: 94px;
      height: 94px;
      border-radius: 50%;
      background: linear-gradient(145deg,#ff9966,#ff5e62);
      box-shadow: 0 16px 28px rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .player-number {
      font-size: 2.1rem;
      font-weight: 900;
      color: #fffaf0;
      text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    }
    .player-card {
      position: absolute;
      bottom: 80px;
      width: 96px;
      height: 130px;
      border-radius: 10px;
      background: linear-gradient(145deg,#ffcc33,#ff7b37);
      box-shadow: 0 10px 22px rgba(0,0,0,0.9);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 6px;
      transform-origin: center bottom;
      transform: translateY(-8px);
    }
    .player-card-inner {
      width: 100%;
      height: 100%;
      border-radius: 8px;
      background: #22041d;
      color: #fff;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 6px;
      font-size: 0.7rem;
      text-align: center;
    }
    .player-name-hidden .player-card-inner {
      background: repeating-linear-gradient(
        45deg,
        #b33b3b,
        #b33b3b 8px,
        #f7cfbf 8px,
        #f7cfbf 16px
      );
      color: transparent;
    }
    .player-out {
      filter: grayscale(0.92) brightness(0.35);
    }
    .player-out .player-card {
      box-shadow: none;
    }
    .player-out .player-card-inner {
      background: #050308;
    }

    .seat-1 { top: 74%; left: 6%; }
    .seat-2 { top: 36%; left: 22%; }
    .seat-3 { top: 20%; left: 45%; }
    .seat-4 { top: 36%; left: 68%; }
    .seat-5 { top: 74%; left: 84%; }
    .seat-6 { top: 88%; left: 45%; }

    .turn-badge {
      position: absolute;
      bottom: -32px;
      padding: 4px 12px;
      border-radius: 999px;
      background: #ffb347;
      color: #3b0b20;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .question-panel {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 3fr 1.5fr;
      gap: 18px;
      align-items: center;
    }
    .question-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .question-btn {
      width: 100%;
      text-align: left;
      padding: 12px 18px;
      border-radius: 999px;
      border: 2px solid #f5d677;
      background: rgba(10,5,20,0.9);
      color: #fff4e6;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(245,214,119,0.35);
      position: relative;
      overflow: hidden;
      transition: all 0.18s ease;
    }
    .question-btn span.label { position: relative; z-index: 1; }
    .question-btn:hover { transform: translateY(-1px); box-shadow: 0 0 22px rgba(245,214,119,0.7); }

    .question-btn.correct {
      background: radial-gradient(circle at 0 0,#1f7a3c 0,#0b2512 70%);
      border-color: #7fff9c;
      box-shadow: 0 0 22px rgba(127,255,156,0.7);
    }
    .question-btn.wrong {
      background: radial-gradient(circle at 0 0,#7a1f1f 0,#250b0b 70%);
      border-color: #ff9c9c;
      animation: flash-red 0.7s ease;
      box-shadow: 0 0 22px rgba(255,120,120,0.7);
    }
    @keyframes flash-red {
      0%,100% { box-shadow: 0 0 0 rgba(255,0,0,0); }
      40% { box-shadow: 0 0 16px rgba(255,40,40,0.9); }
    }

    .guess-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .guess-main-btn {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      border: 4px solid #ffd65a;
      background: radial-gradient(circle at 30% 20%,#ffe9c9 0,#ff2f2f 40%,#850606 100%);
      color: #fff;
      font-weight: 900;
      font-size: 1.05rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-shadow: 0 2px 4px rgba(0,0,0,0.7);
      box-shadow: 0 0 28px rgba(255,70,70,0.9);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      line-height: 1.1;
    }
    .guess-main-btn-line { display: block; }
    .guess-main-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 0 36px rgba(255,110,110,1);
    }
    .guess-main-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .guess-options {
      margin-top: 10px;
      display: none;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .guess-option-btn {
      padding: 8px 14px;
      border-radius: 999px;
      border: 2px solid #ffd876;
      background: rgba(0,0,0,0.7);
      color:#fff;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.18s ease;
      box-shadow: 0 0 14px rgba(255,200,90,0.4);
    }
    .guess-option-btn:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
      box-shadow: 0 0 18px rgba(255,220,140,0.8);
    }

    .notification {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 999px;
      background: rgba(0,0,0,0.9);
      color:#fff;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }
    .notification.show { animation: popFade 1.2s ease forwards; }
    .notification.yes { background: rgba(40,150,80,0.92); }
    .notification.no { background: rgba(190,40,40,0.92); }
    .notification.win { background: rgba(255,180,40,0.95); color:#3b0b20; }
    @keyframes popFade {
      0% { opacity:0; transform:translate(-50%,-10px) scale(0.9); }
      10% { opacity:1; transform:translate(-50%,0) scale(1); }
      80% { opacity:1; }
      100% { opacity:0; transform:translate(-50%,0) scale(1); }
    }

    .fireworks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.8) 0, transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(255,220,150,0.8) 0, transparent 40%),
        radial-gradient(circle at 30% 70%, rgba(255,80,80,0.8) 0, transparent 45%);
      opacity: 0;
      z-index: 900;
    }
    .fireworks.show { animation: fwFade 1.8s ease-out forwards; }
    @keyframes fwFade {
      0% { opacity:0; }
      20% { opacity:1; }
      60% { opacity:1; }
      100% { opacity:0; }
    }

    .win-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 901;
      opacity: 0;
    }
    .win-overlay.show {
      pointer-events: auto;
      animation: winPop 1.4s ease forwards;
    }
    @keyframes winPop {
      0% { opacity:0; transform:scale(0.8); }
      25% { opacity:1; transform:scale(1.05); }
      60% { transform:scale(1); }
      100% { opacity:1; transform:scale(1); }
    }
    .win-card {
      padding: 24px 30px;
      border-radius: 20px;
      background: radial-gradient(circle at top,#fff6c4,#ffc857,#ff7b37);
      color:#3b0b20;
      text-align: center;
      box-shadow: 0 22px 55px rgba(0,0,0,0.9);
    }
    .win-title {
      font-weight: 900;
      font-size: 1.8rem;
      margin-bottom: 8px;
      letter-spacing: 0.12em;
    }
    .win-amount { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
    .win-sub { font-size: 0.9rem; }
    .sub-message { margin-top: 10px; font-size: 0.9rem; opacity: 0.9; }

    .logo-bottom-left {
      position: absolute;
      bottom: 12px;
      left: 22px;
      width: 130px;
      opacity: 0.95;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .question-panel { grid-template-columns: 1fr; }
      .table { height: 260px; }
      .seat-6 { top: 86%; }
    }
  </style>
</head>
<body>
  <div class="notification" id="notif"></div>
  <div class="fireworks" id="fireworks"></div>
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-title">YOU WON!</div>
      <div class="win-amount" id="winAmount">+0.00 AVAX</div>
      <div class="win-sub">Prize sent to your wallet</div>
      <div class="sub-message">SORRY, TRY ANOTHER ROUND! for other players</div>
    </div>
  </div>

  <div class="app">
    <div class="top-bar">
      <button class="top-btn">Profile</button>
      <button class="top-btn">Settings</button>
      <button class="top-btn" id="walletConnect">Wallet connect</button>
    </div>

    <div class="main-card">
      <img src="logo.png" alt="Guess Who Logo" class="logo-bottom-left">
      <button class="exit-btn" id="exitBtn">Exit Game</button>

      <div class="main-inner">
        <div class="center-start">
          <button class="start-btn" id="startGame">
            <span class="start-btn-line">START</span>
            <span class="start-btn-line">THE</span>
            <span class="start-btn-line">GAME</span>
          </button>
        </div>

        <div class="table-wrapper">
          <div class="table" id="table">
            <div class="table-logo">Avalanche</div>

            <div class="player-seat seat-1" data-seat="1">
              <div class="player-card"><div class="player-card-inner" id="cardName1">–</div></div>
              <div class="player-body"><div class="player-number">1</div></div>
            </div>
            <div class="player-seat seat-2" data-seat="2">
              <div class="player-card"><div class="player-card-inner" id="cardName2">–</div></div>
              <div class="player-body"><div class="player-number">2</div></div>
            </div>
            <div class="player-seat seat-3" data-seat="3">
              <div class="player-card"><div class="player-card-inner" id="cardName3">–</div></div>
              <div class="player-body"><div class="player-number">3</div></div>
            </div>
            <div class="player-seat seat-4" data-seat="4">
              <div class="player-card"><div class="player-card-inner" id="cardName4">–</div></div>
              <div class="player-body"><div class="player-number">4</div></div>
            </div>
            <div class="player-seat seat-5" data-seat="5">
              <div class="player-card"><div class="player-card-inner" id="cardName5">–</div></div>
              <div class="player-body"><div class="player-number">5</div></div>
            </div>
            <div class="player-seat seat-6" data-seat="6">
              <div class="player-card"><div class="player-card-inner" id="cardName6">–</div></div>
              <div class="player-body"><div class="player-number">6</div></div>
            </div>
          </div>
        </div>

        <div class="question-panel">
          <div class="qa-left">
            <div class="question-grid" id="questionGrid"></div>
          </div>
          <div class="guess-panel">
            <button class="guess-main-btn" id="guessBtn" disabled>
              <span class="guess-main-btn-line">GUESS</span>
              <span class="guess-main-btn-line">WHO</span>
              <span class="guess-main-btn-line">?</span>
            </button>
            <div class="guess-options" id="guessOptions"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QUESTION_POOL = [
      { id: 'gender', attr: 'gender', text: 'Am I a man?' },
      { id: 'age_20_35', attr: 'age_20_35', text: 'Am I between 20 and 35 years old?' },
      { id: 'age_36_50', attr: 'age_36_50', text: 'Am I between 36 and 50 years old?' },
      { id: 'age_51_plus', attr: 'age_51_plus', text: 'Am I older than 50?' },
      { id: 'alive2026', attr: 'alive2026', text: 'Am I alive in 2026?' },
      { id: 'rock', attr: 'rock', text: 'Do I sing rock music?' },
      { id: 'pop', attr: 'pop', text: 'Do I sing pop music?' },
      { id: 'rap', attr: 'rap', text: 'Do I perform rap or hip-hop?' },
      { id: 'american', attr: 'american', text: 'Am I American?' },
      { id: 'british', attr: 'british', text: 'Am I British?' },
      { id: 'guitarist', attr: 'guitarist', text: 'Do I play guitar on stage?' },
      { id: 'pianist', attr: 'pianist', text: 'Do I play piano or keyboards?' },
      { id: 'beard', attr: 'beard', text: 'Do I have a beard?' },
      { id: 'glasses', attr: 'glasses', text: 'Do I wear glasses?' }
    ];

    let characters = [];
    let assignedCharacters = [];
    let activeSeat = 1;       // 1 = you, 2-6 = bots
    let currentSeat = null;
    let askedQuestionIds = new Set();
    let yesStreakForSeat = {};
    let remainingIdsPerSeat = {};
    let gameStarted = false;
    let account = null;

    const notifEl = document.getElementById('notif');
    const startBtn = document.getElementById('startGame');
    const guessBtn = document.getElementById('guessBtn');
    const questionGrid = document.getElementById('questionGrid');
    const exitBtn = document.getElementById('exitBtn');
    const guessOptionsEl = document.getElementById('guessOptions');
    const fireworksEl = document.getElementById('fireworks');
    const winOverlay = document.getElementById('winOverlay');
    const winAmountEl = document.getElementById('winAmount');
    const walletConnectBtn = document.getElementById('walletConnect');

    async function loadCharacters() {
      const res = await fetch('characters_25.json');
      characters = await res.json();
    }

    function showNotif(message, type = '') {
      notifEl.textContent = message;
      notifEl.className = 'notification';
      if (type) notifEl.classList.add(type);
      requestAnimationFrame(() => {
        notifEl.classList.add('show');
        setTimeout(() => notifEl.classList.remove('show'), 1200);
      });
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function randomSample(arr, count, excludeIds = []) {
      const pool = arr.filter(q => !excludeIds.includes(q.id));
      const sh = shuffle(pool);
      return sh.slice(0, Math.min(count, sh.length));
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert('Please install MetaMask');
        return;
      }
      try {
        const accounts = await ethereum.request({ method: 'eth_requestAccounts' });
        account = accounts[0];
        showNotif('Wallet connected', 'yes');
      } catch (e) {
        console.error(e);
        showNotif('Wallet rejected', 'no');
      }
    }

    async function handleStart() {
      if (!characters.length) await loadCharacters();
      if (!window.ethereum) {
        const ok = confirm('MetaMask not found. Continue demo without wallet?');
        if (!ok) return;
      } else if (!account) {
        await connectWallet();
      }

      const confirmed = confirm('Pay 0.01 AVAX entry fee to start?');
      if (!confirmed) return;

      // Here smart contract joinGame() with 0.01 AVAX will be called in real version
      initGameState();
    }

    function initGameState() {
      gameStarted = true;
      askedQuestionIds.clear();
      yesStreakForSeat = {};
      remainingIdsPerSeat = {};
      guessOptionsEl.style.display = 'none';
      guessOptionsEl.innerHTML = '';
      winOverlay.classList.remove('show');
      fireworksEl.classList.remove('show');

      const shuffled = shuffle(characters);
      assignedCharacters = shuffled.slice(0, 6);

      for (let seat = 1; seat <= 6; seat++) {
        const char = assignedCharacters[seat - 1];
        const label = document.getElementById('cardName' + seat);
        label.textContent = char.name;
        const seatEl = document.querySelector('.player-seat[data-seat="' + seat + '"]');
        seatEl.classList.remove('player-out');
        seatEl.classList.remove('player-name-hidden');
        seatEl.querySelectorAll('.turn-badge').forEach(b => b.remove());
        remainingIdsPerSeat[seat] = assignedCharacters.map(c => c.id);
        yesStreakForSeat[seat] = 0;
      }

      const randomFirst = Math.floor(Math.random() * 6) + 1;
      currentSeat = randomFirst;
      const activeSeatEl = document.querySelector('.player-seat[data-seat="' + activeSeat + '"]');
      activeSeatEl.classList.add('player-name-hidden'); // you do not see your own
      setTurnBadge(currentSeat);
      showNotif('Player ' + currentSeat + ' starts', 'yes');
      renderQuestionsForSeat(currentSeat);
      updateGuessButton();
      if (currentSeat !== activeSeat) {
        setTimeout(botTurnStep, 1000);
      }
    }

    function setTurnBadge(seatNumber) {
      document.querySelectorAll('.turn-badge').forEach(b => b.remove());
      const seatEl = document.querySelector('.player-seat[data-seat="' + seatNumber + '"]');
      const badge = document.createElement('div');
      badge.className = 'turn-badge';
      badge.textContent = (seatNumber === activeSeat ? 'You' : 'Bot ' + seatNumber) + ' turn';
      seatEl.appendChild(badge);
    }

    function renderQuestionsForSeat(seat) {
      questionGrid.innerHTML = '';
      const usedIds = Array.from(askedQuestionIds);
      const roundQuestions = randomSample(QUESTION_POOL, 4, usedIds);
      roundQuestions.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'question-btn';
        btn.dataset.qid = q.id;
        btn.dataset.attr = q.attr;
        btn.innerHTML = '<span class="label">' + q.text + '</span>';
        if (seat === activeSeat) {
          btn.addEventListener('click', () => handleQuestionClick(seat, btn, q));
        }
        questionGrid.appendChild(btn);
      });
    }

    function handleQuestionClick(seat, btn, question) {
      if (!gameStarted || seat !== currentSeat || seat !== activeSeat) return;
      answerQuestion(seat, btn, question);
    }

    function answerQuestion(seat, btn, question) {
      const playerChar = assignedCharacters[seat - 1];
      const v = playerChar[question.attr];
      const isYes = v === 1;

      if (v === 2) {
        if (btn) btn.classList.add('wrong');
        showNotif('Unknown', 'no');
        askedQuestionIds.add(question.id);
        yesStreakForSeat[seat] = 0;
        updateGuessButton();
        passTurn();
        return;
      }

      askedQuestionIds.add(question.id);
      if (isYes) {
        if (btn) btn.classList.add('correct');
        showNotif('YES', 'yes');
        yesStreakForSeat[seat] += 1;
        filterRemainingForSeat(seat, question.attr, true);
        updateGuessButton();
        setTimeout(() => {
          renderQuestionsForSeat(seat);
          if (seat !== activeSeat) setTimeout(botTurnStep, 600);
        }, 600);
      } else {
        if (btn) btn.classList.add('wrong');
        showNotif('NO', 'no');
        filterRemainingForSeat(seat, question.attr, false);
        yesStreakForSeat[seat] = 0;
        updateGuessButton();
        passTurn();
      }
    }

    function filterRemainingForSeat(seat, attr, answerYes) {
      const remaining = remainingIdsPerSeat[seat];
      remainingIdsPerSeat[seat] = remaining.filter(id => {
        const char = assignedCharacters.find(c => c.id === id);
        const v = char[attr];
        if (v === 2) return true;
        return answerYes ? v === 1 : v === 0;
      });
    }

    function updateGuessButton() {
      guessBtn.disabled = !(gameStarted && currentSeat === activeSeat && yesStreakForSeat[activeSeat] > 0);
    }

    function passTurn() {
      let nextSeat = currentSeat;
      for (let i = 0; i < 6; i++) {
        nextSeat = ((nextSeat) % 6) + 1;
        const seatEl = document.querySelector('.player-seat[data-seat="' + nextSeat + '"]');
        if (!seatEl.classList.contains('player-out')) {
          currentSeat = nextSeat;
          break;
        }
      }
      setTurnBadge(currentSeat);
      renderQuestionsForSeat(currentSeat);
      updateGuessButton();
      if (currentSeat !== activeSeat && gameStarted) {
        setTimeout(botTurnStep, 800);
      }
    }

    function botTurnStep() {
      if (!gameStarted || currentSeat === activeSeat) return;
      const qButtons = Array.from(document.querySelectorAll('.question-btn'));
      if (!qButtons.length) return;
      const btn = qButtons[Math.floor(Math.random() * qButtons.length)];
      const qid = btn.dataset.qid;
      const attr = btn.dataset.attr;
      const question = QUESTION_POOL.find(q => q.id === qid);
      answerQuestion(currentSeat, btn, question);

      if (gameStarted && yesStreakForSeat[currentSeat] > 0 && Math.random() < 0.35) {
        setTimeout(() => botGuess(), 600);
      }
    }

    function botGuess() {
      if (!gameStarted || currentSeat === activeSeat) return;
      const seat = currentSeat;
      const options = buildGuessOptions(seat);
      const secret = assignedCharacters[seat - 1];
      const guessCorrect = Math.random() < 0.4;
      const chosen = guessCorrect ? secret : options.find(c => c.id !== secret.id);
      if (chosen.id === secret.id) {
        handleWin(seat);
      } else {
        handleWrongGuess(seat);
      }
    }

    function buildGuessOptions(seat) {
      const remaining = remainingIdsPerSeat[seat];
      const secretId = assignedCharacters[seat - 1].id;
      const base = remaining.includes(secretId) ? remaining : [secretId];
      const pool = [...base];
      while (pool.length < 4) {
        const randomChar = assignedCharacters[Math.floor(Math.random() * assignedCharacters.length)];
        if (!pool.includes(randomChar.id)) pool.push(randomChar.id);
      }
      const objs = pool.map(id => assignedCharacters.find(c => c.id === id));
      return shuffle(objs);
    }

    function handleGuessClick() {
      if (!gameStarted || currentSeat !== activeSeat || yesStreakForSeat[activeSeat] === 0) return;
      const options = buildGuessOptions(activeSeat);
      showGuessOptions(options);
    }

    function showGuessOptions(options) {
      guessOptionsEl.innerHTML = '';
      guessOptionsEl.style.display = 'flex';
      options.forEach(char => {
        const btn = document.createElement('button');
        btn.className = 'guess-option-btn';
        btn.textContent = char.name;
        btn.addEventListener('click', () => handleGuessChoice(char));
        guessOptionsEl.appendChild(btn);
      });
    }

    function handleGuessChoice(chosenChar) {
      const secret = assignedCharacters[activeSeat - 1];
      guessOptionsEl.style.display = 'none';
      if (secret.id === chosenChar.id) {
        handleWin(activeSeat);
      } else {
        handleWrongGuess(activeSeat);
      }
    }

    function handleWrongGuess(seat) {
      const seatEl = document.querySelector('.player-seat[data-seat="' + seat + '"]');
      seatEl.classList.add('player-out');
      showNotif('NO', 'no');
      yesStreakForSeat[seat] = 0;
      if (seat === activeSeat) updateGuessButton();
      passTurn();
    }

    function handleWin(seat) {
      fireworksEl.classList.add('show');
      const prize = 0.05;
      winAmountEl.textContent = '+' + prize.toFixed(2) + ' AVAX';
      winOverlay.classList.add('show');
      showNotif('YOU WON!', 'win');
      gameStarted = false;
    }

    function handleExit() {
      window.location.reload();
    }

    startBtn.addEventListener('click', handleStart);
    guessBtn.addEventListener('click', handleGuessClick);
    exitBtn.addEventListener('click', handleExit);
    walletConnectBtn.addEventListener('click', connectWallet);

    loadCharacters();
  </script>
</body>
</html>
